{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<section class="section">
  <div class="container narrow">
    <div class="card">
      <h1>Admin Login</h1>
      <p>Sign in to access the inquiry dashboard and file uploads.</p>
      <form class="form" method="POST">
        <input type="email" name="email" placeholder="Admin Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button class="btn btn-primary" type="submit">Login</button>
      </form>
      <p class="muted" style="margin-top:14px;">Default admin email is your company email. Change the password via environment variable before production.</p>
    </div>
  </div>
</section>
{% endblock %}
