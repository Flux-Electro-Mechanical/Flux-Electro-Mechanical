{% extends "base.html" %}
{% block title %}Upload Member File | Flux Electro Mechanical{% endblock %}
{% block content %}
<section class="page-hero">
  <div class="container">
    <h1>Upload Member File</h1>
    <p>Create a members-only downloadable resource.</p>
  </div>
</section>
<section class="section">
  <div class="container" style="max-width:760px;">
    <div class="card">
      <form class="form" method="POST" enctype="multipart/form-data">
        <input type="text" name="title" placeholder="Title" required />
        <input type="text" name="category" placeholder="Category (example: document, guide, drawing)" />
        <textarea name="description" placeholder="Description"></textarea>
        <input type="file" name="resource_file" required />
        <button class="btn btn-primary" type="submit">Upload Resource</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
