{% extends "base.html" %}
{% block title %}My Profile | Flux Electro Mechanical{% endblock %}
{% block content %}
<section class="page-hero">
  <div class="container">
    <h1>My Profile</h1>
    <p>Update your member details.</p>
  </div>
</section>
<section class="section">
  <div class="container" style="max-width:760px;">
    <div class="card">
      <form class="form" method="POST">
        <div class="form-row">
          <input type="text" name="full_name" value="{{ client['full_name'] }}" placeholder="Full Name" required />
          <input type="text" name="company_name" value="{{ client['company_name'] or '' }}" placeholder="Company Name" />
        </div>
        <div class="form-row">
          <input type="tel" name="phone_number" value="{{ client['phone_number'] or '' }}" placeholder="Phone Number" />
          <input type="email" value="{{ client['email'] }}" disabled />
        </div>
        <button class="btn btn-primary" type="submit">Save Profile</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
